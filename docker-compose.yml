version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: bidradar_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: bidradar

  backend:
    build: ./backend
    container_name: bidradar_backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/bidradar
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: bidradar_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  mongo_data:
